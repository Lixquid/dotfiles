# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
	colors = true
	color_good = "#47D138"
	color_degraded = "#F3C300"
	color_bad = "#E20800"

	interval = 1
}

## Wireless ####################################################################

order += "wireless wlp58s0"
wireless wlp58s0 {
	format_up = ": %essid [%quality] (%ip)"
	format_down = ""
}

## Ethernet ####################################################################

order += "ethernet eth0"
ethernet eth0 {
	# if you use %speed, i3status requires root privileges
	format_up = ": %ip (%speed)"
	format_down = ""
}

## IPv6 ########################################################################

order += "ipv6"
ipv6 {
	format_up = "𝟞: %ip"
	format_down = "𝟞"
}

## Disk Usage ##################################################################

order += "disk /"
disk "/" {
	format = " %avail (%percentage_avail)"
	prefix_type = "custom"
}

## CPU #########################################################################

order += "cpu_usage"
cpu_usage {
	# format = "⌛ %usage"
	format = " %usage"
	# max_threshold = 0.5
}

## Battery #####################################################################

order += "battery 0"
battery 0 {
	# format = "⚡ %status %percentage %remaining"
	format = "%status %percentage %remaining"
	format_down = "No Battery"
	status_full = ""
	status_chr = ""
	# status_bat = "🔋"
	status_bat = ""
	low_threshold = 20
	threshold_type = "percentage"
}

## Display #####################################################################

order += "volume master"
volume master {
	format = ": %volume"
	format_muted = ": MUT"
	device = "default"
	mixer = "Master"
	mixer_idx = 0
}

## Time ########################################################################

order += "tztime local"
tztime local {
	format = "%c"
}
